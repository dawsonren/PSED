# Medium box — convergence study midpoint
# X-length: uc_a + uc_b = 16 unit cells along heat transport direction

# paths (relative to gpumd/ root)
nep_model: potentials/Si_GAP_nep.txt
gpumd_exec: /home/djr2473/exec/gpumd

# GB generation parameters
gb_generation:
  uc_a: 8
  uc_b: 8
  n_runs: 5
  t_start: 1400.0
  t_end: 300.0
  total_time_ps: 150.0
  timestep_fs: 1.0
  relax_fmax: 0.01
  t_coup: 100.0

# RNEMD parameters
rnemd:
  temperature_k: 675
  nbins: 16
  steps_per_cycle: 400
  timestep_fs: 0.4
  n_cycles: 50
  n_equilibration_cycles: 10
  scale_repeat: 4
  n_runs: 3                # independent rNEMD simulations per structure (for uncertainty)

# GB specifications
grain_boundaries:
  - sigma: 5
    miller: [2, -1, 0]
    axis: [0, 0, 1]
