# Melt + recrystallize — comparison to studies that melt and re-anneal
# t_start=4000 K melts the crystal; total_time_ps=1500 gives time to recrystallize

# paths (relative to gpumd/ root)
nep_model: potentials/Si_GAP_nep.txt
gpumd_exec: /home/djr2473/exec/gpumd

# GB generation parameters
gb_generation:
  uc_a: 3
  uc_b: 3
  n_runs: 5
  t_start: 4000.0        # K — above Si melting point (~1687 K)
  t_end: 300.0
  total_time_ps: 1500.0   # 1.5 ns — slow cool for recrystallization
  timestep_fs: 1.0
  relax_fmax: 0.01
  t_coup: 100.0
  scale_repeat: 4          # repeat along Y and Z before annealing (cross-section convergence)

# RNEMD parameters
rnemd:
  temperature_k: 675
  nbins: 16
  steps_per_cycle: 400
  timestep_fs: 0.4
  n_cycles: 50
  n_equilibration_cycles: 10
  n_runs: 3                # independent rNEMD simulations per structure (for uncertainty)

# ML descriptor parameters
ml:
  bond_cutoff: 3.0          # Å — neighbour cutoff for bond angle/length descriptors
  rdf_cutoff: 10.0          # Å — cutoff for radial distribution function
  rdf_nbins: 200            # bins for g(r)
  soap_cutoff: 6.0          # Å — SOAP cutoff radius
  soap_n_max: 9             # SOAP radial basis functions
  soap_l_max: 9             # SOAP max angular degree
  dihedral_nbins: 36        # bins for dihedral angle entropy (10° per bin)
  gb_dist_thresholds: [5.0, 10.0]  # Å — distance from GB plane for atom subsets

# GB specifications
grain_boundaries:
  - sigma: 5
    miller: [2, -1, 0]
    axis: [0, 0, 1]
